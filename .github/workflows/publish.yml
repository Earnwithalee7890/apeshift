name: Publish ApeShift to Codemod Registry

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate workflow
        run: npx codemod workflow validate -w ./workflow.yaml

      - name: Run tests
        run: npx codemod jssg test -l python ./scripts/codemod.ts

      - name: Publish to Codemod Registry
        run: npx codemod publish
        env:
          CODEMOD_AUTH_TOKEN: ${{ secrets.CODEMOD_TOKEN }}
